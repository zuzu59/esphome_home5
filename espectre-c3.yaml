#-- ATTENTION: la 1ère fois il faut le flasher via web.esphome.io !
#-- REMARQUE: xxx
#-- location: xxx
#-- zf260420.1201, zf260420.1540
#--
# sources: https://github.com/francescopace/espectre/blob/main/SETUP.md
# 


# ESPectre - ESP32-C3 Configuration
# WiFi CSI-based motion detection with Home Assistant integration
#
# Tested boards (community verified):
# - ESP32-C3 Super Mini (AliExpress/Temu, tested by @mvfc, @francescopace)
# - AirM2M Core ESP32-C3 (tested by @WLaoDuo)
#
# ESP32-C3 Super Mini Notes:
# - Set traffic_generator_rate to 94 or less (higher values cause calibration issues)
# - Boards with USB-UART bridges (CH343, CP2102): uncomment hardware_uart in logger section (tested by @gasment)
# - Some cheap clones may require DIO flash mode - see platformio_options below
#
# Provisioning:
# - Via BLE: Use the ESPHome app or Home Assistant companion app
# - Via USB: Use ESPHome web tools (https://web.esphome.io)
# - Via WiFi: Connect to "ESPectre Fallback" AP and configure

substitutions:
  git_ref: main # branch, tag, or commit
  detection_algorithm: mvs # mvs (default) or ml
  esp_name: espectre-c3

esphome:
  name: espectre
  friendly_name: ESPectre
  min_version: 2026.3.0
  # Uncomment the next line if you have multiple ESPectre devices (adds MAC suffix to name)
  # name_add_mac_suffix: true
  # Uncomment for ESP32-C3 Super Mini clones with flash issues (use DIO instead of QIO)
  # platformio_options:
  #   board_build.flash_mode: dio
  project:
    name: francescopace.espectre
    version: ${git_ref}

esp32:
  variant: ESP32C3
  framework:
    type: esp-idf

# Load ESPectre component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/francescopace/espectre
      ref: ${git_ref}
    components: [ espectre ]
    refresh: always

# ESPectre - WiFi CSI Motion Detection
espectre:
  id: espectre_csi
  detection_algorithm: ${detection_algorithm}
  traffic_generator_rate: 94 # Note: For Super Mini boards, keep traffic_generator_rate lower (e.g. 94)

# Dashboard import for easy adoption
dashboard_import:
  package_import_url: github://francescopace/espectre/examples/espectre-c3.yaml@${git_ref}
  import_full_config: true

# Configuration WIFI
wifi:
  ssid: !secret wifi_ssid_apzuzu7
  password: !secret wifi_pass_apzuzu7

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${esp_name} Fallback
    password: !secret ap_wifi_password

captive_portal:

# Improv provisioning via BLE
esp32_improv:
  authorizer: none

# Improv provisioning via USB
improv_serial:

esp32_ble_server:
  id: espectre_ble_server
  services:
    - uuid: "d33ff46b-2203-4775-bc6f-b3a2c36af8f0"
      advertise: true
      characteristics:
        # Telemetry notify payload: 8 bytes (float32 movement, float32 threshold)
        - id: espectre_ble_telemetry
          uuid: "119d5cac-48da-4bd9-bfc3-169805868258"
          notify: true
        # Sysinfo notifications: text key=value lines, ending with END
        - id: espectre_ble_sysinfo
          uuid: "c8c89ffa-c401-461f-9ffc-942fa04adfe3"
          read: true
          notify: true
          value: ""
        # Control writes: REQ_SYSINFO, SET_THRESHOLD:X.XX
        - id: espectre_ble_control
          uuid: "33ed9214-a8d7-40e8-82d1-c82747dcdc71"
          write: true
          write_no_response: true

# Logging
logger:
  level: INFO
  #hardware_uart: UART0  # Uncomment for boards with external USB-UART bridges (CH340, CP2102, etc.)

# Home Assistant API
api:

# OTA updates
ota:
  - platform: esphome

# WEB Server
web_server:
  port: 80

# Définition des Sensors
sensor:
  - platform: wifi_signal
    name: ${esp_name} Signal Wi-Fi
    update_interval: 5s

  - platform: uptime
    name: ${esp_name} uptime
    update_interval: 5s


# Définition des Sensors text
text_sensor:
  - platform: version
    name: ${esp_name} Version 

  - platform: wifi_info
    ip_address:
      name: ${esp_name} IP Address
      id: wifi_ip
    ssid:
      name: ${esp_name} Connected SSID
      id: wifi_ssid

